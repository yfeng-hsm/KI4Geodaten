services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ki4geodaten}
      POSTGRES_USER: ${POSTGRES_USER:-ki4geodaten}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ki4geodaten}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ki4geodaten:ki4geodaten@db:5432/ki4geodaten}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://100.87.51.96:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:26b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-180}
      OLLAMA_MAX_IMAGES_PER_REQUEST: ${OLLAMA_MAX_IMAGES_PER_REQUEST:-20}
      OLLAMA_IMAGE_THUMB_SIZE: ${OLLAMA_IMAGE_THUMB_SIZE:-512}
      OLLAMA_CONCURRENCY: ${OLLAMA_CONCURRENCY:-4}
      GRAPHHOPPER_BASE_URL: ${GRAPHHOPPER_BASE_URL:-http://graphhopper:8989}
      GRAPHHOPPER_TIMEOUT_SECONDS: ${GRAPHHOPPER_TIMEOUT_SECONDS:-30}
      VALHALLA_BASE_URL: ${VALHALLA_BASE_URL:-http://valhalla:8002}
      VALHALLA_TIMEOUT_SECONDS: ${VALHALLA_TIMEOUT_SECONDS:-30}
      MAPILLARY_ACCESS_TOKEN: ${MAPILLARY_ACCESS_TOKEN:-}
      MAPILLARY_CACHE_DIR: /app/data/cache
      MAPILLARY_CACHE_TTL_SECONDS: ${MAPILLARY_CACHE_TTL_SECONDS:-86400}
      MAPILLARY_MAX_IMAGES_PER_GRID: ${MAPILLARY_MAX_IMAGES_PER_GRID:-2000}
    volumes:
      - mapillary-cache:/app/data/cache
      - ./data/graphhopper:/app/data/graphhopper

  graphhopper:
    build:
      context: .
      dockerfile: Dockerfile.graphhopper
      args:
        GRAPHHOPPER_REF: ${GRAPHHOPPER_REF:-master}
    ports:
      - "8989:8989"
      - "8990:8990"
    volumes:
      - ./data/graphhopper:/data

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - "8002:8002"
    environment:
      tile_urls: ${VALHALLA_TILE_URLS:-https://download.geofabrik.de/europe/germany/rheinland-pfalz-latest.osm.pbf}
      server_threads: ${VALHALLA_SERVER_THREADS:-4}
      use_tiles_ignore_pbf: ${VALHALLA_USE_TILES_IGNORE_PBF:-False}
      force_rebuild: ${VALHALLA_FORCE_REBUILD:-False}
      build_elevation: ${VALHALLA_BUILD_ELEVATION:-False}
      build_admins: ${VALHALLA_BUILD_ADMINS:-False}
      build_time_zones: ${VALHALLA_BUILD_TIME_ZONES:-False}
      build_transit: ${VALHALLA_BUILD_TRANSIT:-False}
      build_tar: ${VALHALLA_BUILD_TAR:-True}
    volumes:
      - ./data/valhalla:/custom_files

volumes:
  mapillary-cache:
  postgres-data:
